services:
  postgres:
    image: postgres:18-alpine
    restart: always
    env_file:
      - .env
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - db:/var/lib/postgresql
    
  adminer:
    image: adminer
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: ${POSTGRES_HOST}
    ports:
      - 8080:8080

volumes:
  db: